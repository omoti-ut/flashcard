<script>
	const bank = parse_bank(bank_str);
	shuffle(bank);
	let index = -1;
	let is_left = true;

	function parse_bank(bank_str) {
		return bank_str
			.split("\n")
			.filter(x => x)
			.map(x => x.split(" "));
	}

	function shuffle(array) {
	  for (let i = array.length - 1; i > 0; i--) {
	    // Generate a random index from 0 to i
	    const j = Math.floor(Math.random() * (i + 1));
	    // Swap elements at i and j using destructuring
	    [array[i], array[j]] = [array[j], array[i]];
	  }
	}

	function next_word() {
		index++;
		is_left = Math.random()<0.5;
		update();
	}

	function flip() {
		is_left = !is_left;
		update();
	}

	function update() {
		if(index >= bank.length) {
			word_elm.innerText = "END";
			return;
		}
		if(is_left) {
			word_elm.innerText = bank[index][0];
		} else {
			word_elm.innerText = bank[index][1];
		}
	}

</script>
<body style="display:grid; grid-template: 3fr 1fr / 1fr 1fr; margin:0;" onload=next_word();>
	<div id=word_elm style="grid-column:1/3; font-size:10vh; overflow:auto; max-height:75vh; max-width:100vw">
	</div>
	<div onpointerdown=next_word(); style="background:green;">
	</div>
	<div onpointerdown=flip(); style="background:red;">
	</div>
</body>
